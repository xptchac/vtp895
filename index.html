<!doctype html>
<html lang="vn">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chatbot UTT</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
    <link rel=" icon" href="web-icon.png" type="image/png" />
  </head>
  <style>
    body {
      margin: 0;
      padding: 0;
    }
  </style>
  <body>
    <div class="header-bar">
      <a href="https://utt.edu.vn/vn/" target="_blank" class="to-utt">
        <div class="utt-logo">
          <img src="utt-logo.png" alt="UTT Logo" class="logo-image" />

          <div class="logo-text">
            <span>UNIVERSITY OF</span>
            <span>TRANSPORT</span>
            <span>TECHNOLOGY</span>
          </div>
        </div>
      </a>

      <div class="train">
        <img src="train.png" alt="utt-train" class="train-image" />
      </div>
    </div>

      <div class="chat-header">
    <div class="dot-online"></div> 
    
    <div class="header-text">
        <span class="title-main">CHATBOT UTT</span>
        <span class="title-sub">về Quy chế Đào tạo</span>
        <span class="title-sub-sub">Áp dụng cho sinh viên hệ chính quy từ K75 trở đi.</span>
    </div>
</div>

      <div class="chat-messages" id="chat-messages"></div>
      
      <form id="chat-form" class="chat-form">
        <input
          type="text"
          id="user-input"
          placeholder="Bạn muốn hỏi gì về UTT?"
          required
        />
        <button type="submit" class="send-button">Gửi!</button>
      </form>
    </div>

    <a
      href="https://daotao.utt.edu.vn/congthongtin/Index.aspx"
      target="_blank"
      class="to-dao-tao"
    >
      <span>Tới trang daotao.utt.edu.vn</span>
    </a>
  </body>
</html>
